name: Publish to pub.dev

# Automated publishing via pub.dev + GitHub OIDC.
#
# THE KEY STEP is `dart-lang/setup-dart@v1`: it exchanges the `id-token` below
# for a temporary pub.dev credential and writes it to disk. `subosito/flutter-
# action` alone does NOT do this — without it, `pub` has no credential and falls
# back to interactive browser OAuth (which hangs in CI). We run BOTH: setup-dart
# (for the OIDC credential) and flutter-action (for the Flutter SDK needed to
# resolve `flutter: sdk` deps; its `dart` shadows setup-dart's, which is fine —
# the credential is already on disk).
#
# This mirrors the official reusable workflow
# `dart-lang/setup-dart/.github/workflows/publish.yml`, expanded to publish the
# four federated packages in dependency order.
#
# Publish by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # REQUIRED for pub.dev OIDC — do not remove.
      contents: read
    steps:
      - uses: actions/checkout@v7

      # Provisions the OIDC-based pub.dev credential from the id-token. THE fix.
      - uses: dart-lang/setup-dart@v1
      # Flutter SDK — needed to resolve `flutter: sdk` deps (its dart shadows
      # setup-dart's binary; the pub credential setup-dart wrote is still used).
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      - name: Check OIDC token availability
        run: |
          if [ -n "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "✅ OIDC id-token IS available"
          else
            echo "❌ OIDC id-token NOT available"; exit 1
          fi

      - name: Publish attested_secure_keys_platform_interface
        working-directory: packages/attested_secure_keys_platform_interface
        run: dart pub publish --force
      - run: sleep 45

      - name: Publish attested_secure_keys_android
        working-directory: packages/attested_secure_keys_android
        run: dart pub publish --force

      - name: Publish attested_secure_keys_ios
        working-directory: packages/attested_secure_keys_ios
        run: dart pub publish --force
      - run: sleep 45

      - name: Publish attested_secure_keys
        working-directory: packages/attested_secure_keys
        run: dart pub publish --force
