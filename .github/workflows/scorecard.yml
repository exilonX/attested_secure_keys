name: Scorecard supply-chain security

# OpenSSF Scorecard: scores the repo's security posture (branch protection,
# pinned actions, token permissions, dangerous workflow patterns, dependency
# update tooling, etc.) and uploads findings to the Security tab. Publishing the
# result to the OpenSSF metrics API (publish_results: true) is what powers the
# public Scorecard badge — standard for public OSS repos.

on:
  branch_protection_rule:
  push:
    branches: [main]
  schedule:
    - cron: "0 7 * * 1" # weekly, Monday 07:00 UTC

# Read-all by default; the job below narrowly elevates what it needs.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results to the OpenSSF API (badge)
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
