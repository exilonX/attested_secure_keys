name: Device tests (Firebase Test Lab)

# Runs the example's integration_test suite on REAL Android devices in Firebase
# Test Lab. Emulators always report software/none, so this is the only way to
# exercise the genuine Keystore / StrongBox / attestation paths across OS levels.
#
# One-time setup (once the repo + a GCP project exist). See doc/FIREBASE_TEST_LAB.md
# for the exact gcloud commands.
#   1. Enable APIs: testing, toolresults, iamcredentials, sts (the last two are
#      required for Workload Identity Federation impersonation — easy to miss).
#   2. Configure Workload Identity Federation for this repo (preferred — no keys),
#      OR add a service-account JSON as the secret GCP_SA_KEY.
#   3. Service account roles: cloudtestservice.testAdmin + serviceusage.serviceUsageConsumer,
#      and storage.objectAdmin ON YOUR RESULTS BUCKET (see 5).
#   4. The Android instrumentation harness is committed:
#      example/android/app/src/androidTest/.../MainActivityTest.java.
#   5. Create a results bucket you OWN (the default Test Lab bucket is Google-managed
#      and a custom SA cannot write to it).
#   6. Set repo variables: GCP_PROJECT_ID, GCP_WIF_PROVIDER, GCP_SERVICE_ACCOUNT,
#      GCP_RESULTS_BUCKET (the bucket from 5).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # nightly
  pull_request:
    types: [labeled] # also run when a PR is labeled "device-tests"

jobs:
  android-device-tests:
    if: github.event_name != 'pull_request' || github.event.label.name == 'device-tests'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for Workload Identity Federation (tokenless auth)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      # Build the app APK + the instrumentation (androidTest) APK that drives the
      # Dart integration_test suite on-device.
      - name: Build app + androidTest APKs
        working-directory: packages/attested_secure_keys/example/android
        run: ./gradlew app:assembleDebug app:assembleDebugAndroidTest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          # If not using Workload Identity Federation, comment the two lines above
          # and use a service-account key secret instead:
          # credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      # Devices: combos MUST be valid (panther/34 returned "Incompatible
      # device/OS combination") — list valid ones with:
      #   gcloud firebase test android models list
      # Start with one known-good StrongBox device; expand the matrix once green.
      # Do NOT add --use-orchestrator: the Android Test Orchestrator runs each
      # test method in its own process and is incompatible with Flutter's
      # integration_test (single-pass FlutterTestRunner) — it hangs → "Test timed out".
      - name: Run integration_test on Firebase Test Lab
        working-directory: packages/attested_secure_keys/example
        env:
          # A results bucket IN YOUR project. Required: Test Lab's *default*
          # bucket is Google-managed and a custom service account cannot write to
          # it (storage.objects.create denied). Create one you own and grant the
          # SA roles/storage.objectAdmin on it, then set this repo variable. If
          # unset, the run uses the default bucket (works only with the
          # Firebase-managed Test Lab service identity, not a custom SA).
          RESULTS_BUCKET: ${{ vars.GCP_RESULTS_BUCKET }}
        run: |
          BUCKET_ARG=""
          if [ -n "$RESULTS_BUCKET" ]; then BUCKET_ARG="--results-bucket=$RESULTS_BUCKET"; fi
          gcloud firebase test android run \
            --type instrumentation \
            --app build/app/outputs/apk/debug/app-debug.apk \
            --test build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            $BUCKET_ARG \
            --device model=oriole,version=33,locale=en,orientation=portrait \
            --timeout 6m
