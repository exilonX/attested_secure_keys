name: Device tests (Firebase Test Lab)

# Runs the example's integration_test suite on REAL Android devices in Firebase
# Test Lab. Emulators always report software/none, so this is the only way to
# exercise the genuine Keystore / StrongBox / attestation paths across OS levels.
#
# One-time setup (once the repo + a GCP project exist):
#   1. Create a GCP project and enable the "Cloud Testing" + "Cloud Tool Results" APIs.
#   2. Configure Workload Identity Federation for this repo (preferred — no keys),
#      OR add a service-account JSON as the secret GCP_SA_KEY.
#   3. Set repo variables: GCP_PROJECT_ID, GCP_WIF_PROVIDER, GCP_SERVICE_ACCOUNT.
#   4. Add the Android instrumentation harness the integration_test docs require:
#      example/android/app/src/androidTest/.../MainActivityTest.java
#      (see https://docs.flutter.dev/cookbook/testing/integration/introduction
#       → "Android device testing" / Firebase Test Lab).

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # nightly
  pull_request:
    types: [labeled] # also run when a PR is labeled "device-tests"

jobs:
  android-device-tests:
    if: github.event_name != 'pull_request' || github.event.label.name == 'device-tests'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for Workload Identity Federation (tokenless auth)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      # Build the app APK + the instrumentation (androidTest) APK that drives the
      # Dart integration_test suite on-device.
      - name: Build app + androidTest APKs
        working-directory: packages/attested_secure_keys/example/android
        run: ./gradlew app:assembleDebug app:assembleDebugAndroidTest

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          # If not using Workload Identity Federation, comment the two lines above
          # and use a service-account key secret instead:
          # credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      # Pick a TEE device and a StrongBox-capable device to cover both tiers.
      # List ids with: gcloud firebase test android models list
      - name: Run integration_test on Firebase Test Lab
        working-directory: packages/attested_secure_keys/example
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app build/app/outputs/apk/debug/app-debug.apk \
            --test build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=oriole,version=33,locale=en,orientation=portrait \
            --device model=panther,version=34,locale=en,orientation=portrait \
            --timeout 6m \
            --use-orchestrator
