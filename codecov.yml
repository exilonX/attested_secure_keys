# Codecov configuration — https://docs.codecov.com/docs/codecov-yaml
# Scope coverage to hand-written Dart so the badge measures our code, not the
# Pigeon-generated bindings.

coverage:
  status:
    # Report coverage, but never fail a PR on it (informational only).
    project:
      default:
        informational: true
    patch:
      default:
        informational: true

# Exclude generated bindings and non-library code from the coverage denominator.
ignore:
  - "**/*.g.dart" # Pigeon-generated platform-channel bindings (messages.g.dart)
  - "**/pigeons/**" # Pigeon schema (source, not shipped lib)
  - "**/example/**" # demo app
  - "**/test/**" # the tests themselves
